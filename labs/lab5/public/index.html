<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <main class="container">
    <header class="hero">
      <h1>Music App</h1>

      <p>Search for artist or find similar</p>
    </header>



    <section class="search-box">
      <label for="artistInput">Artist Name</label>
      <div class="search-row">
        <input
          type="text"
          id="artistInput"
          placeholder="Enter an artist name"
          aria-describedby="statusMessage"
        />

        <button type="button" id="searchBtn">Search</button>
      </div>
      <p id="statusMessage" class="status" aria-live="polite"></p>
    </section>


    <section>
      <h2>Search Results</h2>


      <div id="results" class="grid"></div>
    </section>

    <section>
      <h2> Artist you would like</h2>
      <div id="recommendations" class="grid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
